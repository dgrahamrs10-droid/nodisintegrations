<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7931e"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="none" stroke="#ff6b35" stroke-width="16" opacity="0.6"/>
  <!-- Lightning bolt -->
  <polygon points="296,60 176,280 248,280 216,452 336,232 264,232" fill="url(#bolt)" opacity="0.95"/>
  <!-- Glow effect -->
  <polygon points="296,60 176,280 248,280 216,452 336,232 264,232" fill="none" stroke="#f7931e" stroke-width="4" opacity="0.4"/>
</svg>
